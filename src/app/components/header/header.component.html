<header>
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container-fluid px-2">
      <!-- Logo on the Far Left -->
      <a routerLink="/" class="navbar-brand logo me-auto">
        <div class="logo-container">
          <i class="bi bi-lightning-charge-fill logo-icon"></i>
          <div class="logo-text-wrapper">
            <span class="logo-main">AllIndia</span>
            <span class="logo-sub">Jobs.com</span>
          </div>
        </div>
      </a>

      <!-- Right Side Actions -->
      <div class="d-flex align-items-center gap-2">
       

        <!-- Enhanced Menu Button on the Far Right -->
        <button class="menu-toggle-btn ms-2" (click)="toggleNav($event)" aria-label="Toggle Navigation">
          <div class="menu-icon-wrapper">
            <i class="bi bi-list"></i>
          </div>
        </button>
      </div>
    </div>
  </nav>

  <!-- Mobile Offcanvas Menu -->
  <div class="mobile-offcanvas" [class.active]="isNavActive">
    <div class="offcanvas-header-nav">
      <div class="logo-container">
        <i class="bi bi-lightning-charge-fill logo-icon"></i>
        <div class="logo-text-wrapper">
          <span class="logo-main text-white">AllIndiaJobs</span>
        </div>
      </div>
      <button type="button" class="btn-close-custom" (click)="closeNav()">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>
    
    <div class="offcanvas-body">
      <!-- Job Categories List -->
      <div class="offcanvas-menu-list px-2 py-1">
        <h6 class="section-label">Browse Jobs</h6>
        <div class="menu-items">
          <a *ngFor="let cat of navCategories" 
             [routerLink]="cat.route" 
             (click)="closeNav()"
             class="menu-item"
             routerLinkActive="active">
            <div class="menu-item-icon" [style.background-color]="cat.color + '15'" [style.color]="cat.color">
              <i class="bi" [ngClass]="cat.icon"></i>
            </div>
            <span class="menu-item-text">{{ cat.name }}</span>
            <i class="bi bi-chevron-right ms-auto chevron"></i>
          </a>
        </div>
      </div>

      <!-- Social Follow Section -->
      <div class="offcanvas-social-section px-2 py-1">
        <h6 class="section-label">Follow Us</h6>
        <div class="social-icons-grid">
          <button class="social-btn btn-yt" (click)="openExternalChannel('https://www.youtube.com/@allindajobs')">
            <i class="bi bi-youtube"></i>
          </button>
          <button class="social-btn btn-wa" (click)="openExternalChannel('https://whatsapp.com/channel/0029VbCLJWjCRs1nIKjUlh3p')">
            <i class="bi bi-whatsapp"></i>
          </button>
          <button class="social-btn btn-fb" (click)="openExternalChannel('https://www.facebook.com/allindiajobs')">
            <i class="bi bi-facebook"></i>
          </button>
          <button class="social-btn btn-ig" (click)="openExternalChannel('https://www.instagram.com/allindiajobs')">
            <i class="bi bi-instagram"></i>
          </button>
        </div>
      </div>
    </div>
    
    <div class="offcanvas-footer p-3">
      <p class="copyright-text mb-0">&copy; 2026 AllIndiaJobs.com</p>
    </div>
  </div>
  <div class="offcanvas-overlay" *ngIf="isNavActive" (click)="closeNav()"></div>
</header>
