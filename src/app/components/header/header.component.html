<header>
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container-fluid px-2 d-flex justify-content-center">
      <!-- Logo Centered -->
      <a routerLink="/" class="navbar-brand logo mb-0">
        <span class="logo-main"><span class="logo-part1">AllIndia</span><span class="logo-part2">Jobs</span><span class="logo-part3">.com</span></span>
      </a>
    </div>
  </nav>

  <!-- Category Pills Bar (fixed below navbar) -->
  <div class="pills-bar">
    <div class="pills-scroll-row">
      <a class="jc-pill" routerLink="/" routerLinkActive="jc-pill-active" [routerLinkActiveOptions]="{exact: true}">
        <span>Home</span>
      </a>

      <a *ngIf="isJobDetailsPage()" class="jc-pill jc-pill-active">
        <span>Job Information</span>
      </a>

      <a class="jc-pill" routerLink="/IT Walk-ins" routerLinkActive="jc-pill-active" [routerLinkActiveOptions]="{exact: true}">
        <span>IT Walk-ins</span>
      </a>
    
      <a class="jc-pill" routerLink="/BPO Walk-ins" routerLinkActive="jc-pill-active" [routerLinkActiveOptions]="{exact: true}">
        <span>BPO Walk-ins</span>
      </a>
      
      <a class="jc-pill" routerLink="/Non-IT Walk-ins" routerLinkActive="jc-pill-active" [routerLinkActiveOptions]="{exact: true}">
        <span>Non-IT Walk-ins</span>
      </a>
      
      <a class="jc-pill" routerLink="/Sales Walk-ins" routerLinkActive="jc-pill-active" [routerLinkActiveOptions]="{exact: true}">
        <span>Sales Walk-ins</span>
      </a>
      
      <a class="jc-pill" routerLink="/Banking Walk-ins" routerLinkActive="jc-pill-active" [routerLinkActiveOptions]="{exact: true}">
        <span>Banking Walk-ins</span>
      </a>
      
      <a class="jc-pill" routerLink="/Pharma Walk-ins" routerLinkActive="jc-pill-active" [routerLinkActiveOptions]="{exact: true}">
        <span>Pharma Walk-ins</span>
      </a>
    </div>
  </div>
</header>
