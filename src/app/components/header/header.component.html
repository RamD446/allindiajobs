<header>
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container-fluid px-2 d-flex justify-content-center">
      <!-- Logo Centered -->
      <a routerLink="/" class="navbar-brand logo mb-0">
        <span class="logo-main"><span class="logo-part1">AllIndia</span><span class="logo-part2">Jobs</span><span class="logo-part3">.com</span></span>
      </a>
    </div>
  </nav>



  <!-- Category Pills Bar (fixed below navbar) -->
  <div class="pills-bar">
    <div class="pills-scroll-row">
      <button class="jc-pill" routerLink="/government-jobs" routerLinkActive="jc-pill-active" [routerLinkActiveOptions]="{exact: true}">
        <i class="bi bi-building-fill"></i>
        <span>All Govt Jobs</span>
      </button>
    
      <button class="jc-pill" routerLink="/walk-in-drives" routerLinkActive="jc-pill-active" [routerLinkActiveOptions]="{exact: true}">
        <i class="bi bi-person-walking"></i>
        <span>All Walk-in Interviews</span>
      </button>
      <button class="jc-pill" routerLink="/all-private-jobs" routerLinkActive="jc-pill-active" [routerLinkActiveOptions]="{exact: true}">
        <i class="bi bi-briefcase-fill"></i>
        <span>All Private Jobs</span>
      </button>
      <button class="jc-pill" routerLink="/government-job-results" routerLinkActive="jc-pill-active" [routerLinkActiveOptions]="{exact: true}">
        <i class="bi bi-trophy-fill"></i>
        <span>Govt Job Results</span>
      </button>
      <button *ngIf="getTodayWalkinsCount() > 0" class="jc-pill" routerLink="/today-walkins" routerLinkActive="jc-pill-active" [routerLinkActiveOptions]="{exact: true}">
        <i class="bi bi-person-walking"></i>
        <span>Today Walk-ins</span>
      </button>
      <button class="jc-pill" routerLink="/health-and-career-tips" routerLinkActive="jc-pill-active" [routerLinkActiveOptions]="{exact: true}">
        <i class="bi bi-heart-pulse-fill"></i>
        <span>Career Tips</span>
      </button>
      <button class="jc-pill" routerLink="/current-affairs" routerLinkActive="jc-pill-active" [routerLinkActiveOptions]="{exact: true}">
        <i class="bi bi-newspaper"></i>
        <span>Current Affairs</span>
      </button>
      <button class="jc-pill" routerLink="/telugu-to-english-learning" routerLinkActive="jc-pill-active" [routerLinkActiveOptions]="{exact: true}">
        <i class="bi bi-translate"></i>
        <span>Telugu-English</span>
      </button>
    </div>
  </div>
</header>
