<header>
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container-fluid px-2 d-flex justify-content-center">
      <!-- Logo Centered -->
      <a routerLink="/" class="navbar-brand logo mb-0">
        <span class="logo-main"><span class="logo-part1">AllIndia</span><span class="logo-part2">Jobs</span><span class="logo-part3">.com</span></span>
      </a>
    </div>
  </nav>

  <!-- Category Pills Bar (fixed below navbar) -->
  <div class="pills-bar">
    <div class="pills-scroll-row">
      <a class="jc-pill" routerLink="/" routerLinkActive="jc-pill-active" [routerLinkActiveOptions]="{exact: true}">
        <span>Home</span>
      </a>

      <a *ngIf="isJobDetailsPage()" class="jc-pill jc-pill-active">
        <span>Job Full Information</span>
      </a>

      <a class="jc-pill" routerLink="/government-jobs" routerLinkActive="jc-pill-active" [routerLinkActiveOptions]="{exact: true}">
        <span>All Govt Jobs</span>
      </a>
    
      <a class="jc-pill" routerLink="/walk-in-drives" routerLinkActive="jc-pill-active" [routerLinkActiveOptions]="{exact: true}">
        <span>All Walk-in Interviews</span>
      </a>
      <a class="jc-pill" routerLink="/all-private-jobs" routerLinkActive="jc-pill-active" [routerLinkActiveOptions]="{exact: true}">
        <span>All Private Jobs</span>
      </a>
      <a class="jc-pill" routerLink="/government-job-results" routerLinkActive="jc-pill-active" [routerLinkActiveOptions]="{exact: true}">
        <span>Govt Job Results</span>
      </a>
      <a *ngIf="getTodayWalkinsCount() > 0" class="jc-pill" routerLink="/today-walkins" routerLinkActive="jc-pill-active" [routerLinkActiveOptions]="{exact: true}">
        <span>Today Walk-ins</span>
      </a>
      <a class="jc-pill" routerLink="/current-affairs" routerLinkActive="jc-pill-active" [routerLinkActiveOptions]="{exact: true}">
        <span>Current Affairs</span>
      </a>
    </div>
  </div>
</header>
