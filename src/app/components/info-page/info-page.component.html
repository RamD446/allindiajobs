<div class="info-page-bg">
  <div class="container info-body">
    <div class="info-card">
      <!-- Card Header -->
      <div class="info-card-header">
        <i class="bi" [ngClass]="pageIcon"></i>
        <h2 class="info-card-title">{{ title }}</h2>
      </div>
      <!-- Card Content -->
      <div class="info-content" [innerHTML]="sanitizedContent"></div>
    </div>
  </div>
</div>
