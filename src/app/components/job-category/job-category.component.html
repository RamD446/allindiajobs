<div class="jc">
  <!-- Loading -->
  <div *ngIf="isLoading" class="finding-jobs-loader">
    <div class="loader-icon-wrap">
      <i class="bi bi-briefcase-fill loader-briefcase"></i>
      <div class="loader-dots">
        <span></span><span></span><span></span>
      </div>
    </div>
    <p class="loader-title">Finding Jobs<span class="loader-ellipsis">...</span></p>
    <p class="loader-sub">Please wait while we load the latest opportunities</p>
  </div>

  <!-- Content -->
  <div *ngIf="!isLoading && filteredJobs.length > 0">
    <div class="container-fluid">
  

      <div class="row g-3">
        <!-- Main Column (col-8) -->
        <div class="col-12 col-md-8">
          
          <!-- Latest Government Jobs (If applicable) -->
          <div class="card home-job-card mb-4" *ngIf="getGovJobs().length > 0">
            <div class="card-header gov-header">
              <i class="bi bi-building-fill me-2 fs-header"></i>
              <span>Latest Government Jobs</span>
            </div>
            <div class="card-body p-0">
              <div class="table-responsive">
                <table class="table mb-0">
                  <tbody>
                    <tr *ngFor="let job of getGovJobs()" class="clickable-row" (click)="viewJobDetails(job)">
                      <td>
                        <div class="d-flex align-items-start justify-content-between gap-2">
                          <span class="job-title-cell"><i class="bi bi-caret-right-fill jfi-sidebar-icon me-1"></i>{{ job.title }}</span>
                          <button class="btn btn-view-pink flex-shrink-0" (click)="viewJobDetails(job)">View</button>
                        </div>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>

          <!-- Main Category Jobs -->
          <div class="card home-job-card mb-4" *ngIf="getPrivateJobs().length > 0">
            <div class="card-header pvt-header">
              <i [class]="categoryParam === 'health-and-career-tips' ? 'bi bi-heart-pulse-fill me-2 fs-header' : (categoryParam === 'government-job-results' ? 'bi bi-trophy-fill me-2 fs-header' : 'bi bi-briefcase-fill me-2 fs-header')"></i>
              <span>{{ categoryTitle }}</span>
            </div>
            <div class="card-body p-0">
              <!-- Table format for Walk-in categories -->
              <div *ngIf="categoryTitle === 'Walk-in Drives' || categoryTitle === 'All Walk-in Drives' || categoryTitle === 'Today Walk-in Drives'" class="table-responsive">
                <table class="table mb-0">
                  <tbody>
                    <tr *ngFor="let job of getPrivateJobs()" class="clickable-row" (click)="viewJobDetails(job)">
                      <td>
                        <div class="d-flex align-items-start justify-content-between gap-2">
                          <span class="job-title-cell"><i class="bi bi-caret-right-fill jfi-sidebar-icon me-1"></i>{{ job.title }}</span>
                          <button class="btn btn-view-pink flex-shrink-0" (click)="viewJobDetails(job)">View</button>
                        </div>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
              <!-- Table format for other categories -->
              <ng-container *ngIf="categoryTitle !== 'Walk-in Drives' && categoryTitle !== 'All Walk-in Drives' && categoryTitle !== 'Today Walk-in Drives'">
                <div class="table-responsive">
                  <table class="table mb-0">
                    <tbody>
                      <tr *ngFor="let job of getPrivateJobs()" class="clickable-row" (click)="viewJobDetails(job)">
                        <td>
                          <div class="d-flex align-items-start justify-content-between gap-2">
                            <span class="job-title-cell">
                              <i class="bi bi-caret-right-fill jfi-sidebar-icon me-1"></i>
                              {{ job.title }}
                            </span>
                            <button class="btn btn-view-pink flex-shrink-0" (click)="viewJobDetails(job)">View</button>
                          </div>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </ng-container>
            </div>
          </div>

          <!-- Pagination -->
          <nav *ngIf="filteredJobs.length > jobsPerPage" class="mt-4 mb-5">
            <ul class="pagination justify-content-center">
              <li class="page-item" [class.disabled]="currentPage === 1">
                <button class="page-link" (click)="goToPage(currentPage - 1)">Prev</button>
              </li>
              <li class="page-item" *ngFor="let page of [].constructor(getTotalPages()); let i = index" [class.active]="currentPage === (i+1)">
                <button class="page-link" (click)="goToPage(i+1)">{{ i+1 }}</button>
              </li>
              <li class="page-item" [class.disabled]="currentPage === getTotalPages()">
                <button class="page-link" (click)="goToPage(currentPage + 1)">Next</button>
              </li>
            </ul>
          </nav>
        </div>

        <!-- Sidebar Column (col-4) -->
        <div class="col-12 col-md-4">
          <!-- Recent Posts -->
          <div class="card home-job-card mb-3">
            <div class="card-header pvt-header">
              <i class="bi bi-clock-history me-2 fs-header"></i>
              <span>Recent Posts</span>
            </div>
            <div class="card-body p-0">
              <div class="table-responsive">
                <table class="table mb-0">
                  <tbody>
                    <tr *ngFor="let job of getRecentPosts()" class="clickable-row" (click)="viewJobDetails(job)">
                      <td>
                        <div class="d-flex align-items-start justify-content-between gap-2">
                          <span class="job-title-cell">
                            <i class="bi bi-caret-right-fill jfi-sidebar-icon me-1"></i>{{ job.title }}
                          </span>
                          <button class="btn btn-view-pink flex-shrink-0" (click)="viewJobDetails(job)">View</button>
                        </div>
                      </td>
                    </tr>
                    <tr *ngIf="getRecentPosts().length === 0">
                      <td class="text-center text-muted py-3" style="font-size:0.8rem">No recent posts</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Empty State -->
  <div *ngIf="!isLoading && filteredJobs.length === 0" class="text-center my-5 py-5">
    <div class="mb-3">
      <i class="bi bi-search" style="font-size: 3rem; color: #90caf9;"></i>
    </div>
    <h3 class="fw-bold" style="color: #1565c0;">No Jobs Found</h3>
    <p class="text-muted">No opportunities found in {{ categoryTitle.toLowerCase() }}.</p>
    <a routerLink="/" class="btn btn-primary rounded-pill px-4 mt-2" style="background: #1565c0; border: none;">
      Browse All Jobs
    </a>
  </div>
</div>
