<div class="occ-page">
  <div class="container py-4">
    <div class="occ-header-section mb-4">
      <h2 class="occ-main-title">
        <i class="bi bi-building-check text-primary"></i> Official Company Careers
      </h2>
      <p class="occ-subtitle">Official careers links to top organizations</p>
    </div>

    <!-- Loading -->
    <div *ngIf="isLoading" class="finding-jobs-loader">
      <div class="loader-icon-wrap">
        <i class="bi bi-briefcase-fill loader-briefcase"></i>
        <div class="loader-dots">
          <span></span><span></span><span></span>
        </div>
      </div>
      <p class="loader-title">Finding Jobs<span class="loader-ellipsis">...</span></p>
      <p class="loader-sub">Please wait while we load the latest opportunities</p>
    </div>

    <!-- Content -->
    <div *ngIf="!isLoading">
      <div *ngFor="let type of careerJobTypes" class="occ-type-section mb-5">
        <h4 class="occ-type-title mb-3">
          <i class="bi bi-tag-fill me-2"></i> {{ type }} Careers
        </h4>
        <div class="row g-3">
          <div class="col-12 col-md-6 col-lg-4" *ngFor="let career of getCareersByType(type)">
            <div class="occ-card">
              <div class="occ-card-body">
                <div class="d-flex justify-content-between align-items-center">
                  <span class="occ-company-name">{{ career.company }}</span>
                  <a [href]="career.careerOfficeUrl" target="_blank" class="occ-btn">
                    Visit Careers <i class="bi bi-box-arrow-up-right"></i>
                  </a>
                </div>
              </div>
            </div>
          </div>
          <div class="col-12" *ngIf="getCareersByType(type).length === 0">
            <p class="text-muted fst-italic">No career links available for this category yet.</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Back Button -->
    <div class="mt-4 text-center">
      <a routerLink="/all-latest-jobs" class="btn btn-outline-primary rounded-pill px-4">
        <i class="bi bi-arrow-left me-2"></i> Back to Home
      </a>
    </div>
  </div>
</div>
